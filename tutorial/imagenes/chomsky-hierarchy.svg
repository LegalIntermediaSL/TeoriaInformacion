<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380" font-family="serif">
  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Jerarquía de Chomsky</text>

  <!-- RE — nivel 0: recursivamente enumerables -->
  <ellipse cx="250" cy="200" rx="230" ry="155" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="52" y="200" font-size="12" fill="#92400e" font-weight="bold">RE</text>
  <text x="38" y="215" font-size="11" fill="#92400e">Tipo 0</text>
  <text x="38" y="228" font-size="10" fill="#92400e">MT general</text>

  <!-- CSL — nivel 1: sensibles al contexto -->
  <ellipse cx="255" cy="205" rx="175" ry="115" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="95" y="208" font-size="12" fill="#065f46" font-weight="bold">CSL</text>
  <text x="88" y="222" font-size="11" fill="#065f46">Tipo 1</text>
  <text x="84" y="235" font-size="10" fill="#065f46">MT acotada</text>

  <!-- CFL — nivel 2: libres de contexto -->
  <ellipse cx="260" cy="210" rx="120" ry="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="153" y="215" font-size="12" fill="#1e40af" font-weight="bold">CFL</text>
  <text x="148" y="229" font-size="11" fill="#1e40af">Tipo 2</text>
  <text x="148" y="242" font-size="10" fill="#1e40af">Autómata</text>
  <text x="148" y="253" font-size="10" fill="#1e40af">de pila</text>

  <!-- Regular — nivel 3 -->
  <ellipse cx="265" cy="215" rx="60" ry="42" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="237" y="213" font-size="12" fill="#4c1d95" font-weight="bold">Regular</text>
  <text x="237" y="226" font-size="11" fill="#4c1d95">Tipo 3</text>
  <text x="237" y="238" font-size="10" fill="#4c1d95">DFA/NFA</text>

  <!-- Ejemplos en cada nivel -->
  <!-- RE pero no decidible -->
  <text x="390" y="90" font-size="11" fill="#92400e" font-style="italic">Problema</text>
  <text x="390" y="103" font-size="11" fill="#92400e" font-style="italic">de la parada</text>
  <line x1="388" y1="110" x2="460" y2="130" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CSL pero no CFL -->
  <text x="60" y="135" font-size="11" fill="#065f46" font-style="italic">{aⁿbⁿcⁿ}</text>
  <line x1="95" y1="140" x2="130" y2="150" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CFL pero no regular -->
  <text x="50" y="275" font-size="11" fill="#1e40af" font-style="italic">{aⁿbⁿ}</text>
  <line x1="80" y1="272" x2="145" y2="265" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Regular -->
  <text x="350" y="300" font-size="11" fill="#4c1d95" font-style="italic">(0|1)*10</text>
  <line x1="358" y1="294" x2="322" y2="250" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Leyenda de inclusión -->
  <text x="250" y="365" text-anchor="middle" font-size="12" fill="#444">Regular ⊂ CFL ⊂ CSL ⊂ RE    (inclusiones estrictas)</text>
</svg>
