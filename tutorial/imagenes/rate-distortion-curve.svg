<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" font-family="serif">
  <text x="240" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Curva de tasa-distorsión R(D)</text>

  <!-- Ejes -->
  <line x1="70" y1="300" x2="430" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="300" x2="70" y2="40" stroke="#333" stroke-width="2"/>

  <!-- Flecha eje X -->
  <polygon points="430,296 438,300 430,304" fill="#333"/>
  <text x="440" y="304" font-size="13" fill="#333">D</text>
  <!-- Flecha eje Y -->
  <polygon points="66,40 70,32 74,40" fill="#333"/>
  <text x="50" y="36" font-size="13" fill="#333">R</text>

  <!-- Marcas eje X -->
  <!-- D=0 a D=0.5 para Bernoulli(0.3), D=0 a D=sigma^2 para Gaussiana -->
  <line x1="70" y1="300" x2="70" y2="305" stroke="#333" stroke-width="1.5"/>
  <text x="68" y="318" font-size="11" text-anchor="middle" fill="#333">0</text>

  <line x1="200" y1="300" x2="200" y2="305" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="318" font-size="11" text-anchor="middle" fill="#555">0.1</text>

  <line x1="330" y1="300" x2="330" y2="305" stroke="#333" stroke-width="1.5"/>
  <text x="330" y="318" font-size="11" text-anchor="middle" fill="#555">0.2</text>

  <line x1="395" y1="300" x2="395" y2="305" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="318" font-size="11" text-anchor="middle" fill="#555">D*</text>

  <!-- Marcas eje Y -->
  <line x1="65" y1="60" x2="70" y2="60" stroke="#333" stroke-width="1.5"/>
  <text x="58" y="64" font-size="11" text-anchor="end" fill="#555">H(p)</text>

  <line x1="65" y1="150" x2="70" y2="150" stroke="#333" stroke-width="1.5"/>
  <text x="62" y="154" font-size="11" text-anchor="end" fill="#555">1</text>

  <line x1="65" y1="300" x2="70" y2="300" stroke="#333" stroke-width="1.5"/>
  <text x="62" y="304" font-size="11" text-anchor="end" fill="#555">0</text>

  <!-- Cuadrícula suave -->
  <line x1="70" y1="150" x2="430" y2="150" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="200" y1="60" x2="200" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Curva Bernoulli(p=0.3): R(D) = H_b(0.3) - H_b(D) para 0 ≤ D ≤ 0.3 -->
  <!-- H_b(0.3) ≈ 0.881 bits, mapeado: R=0 -> y=300, R=0.881 -> y=300-0.881*240=88 -->
  <!-- D=0 -> x=70, D=0.3 -> x=70+0.3*1300≈460 pero escala D: 0.3 ocupa 395-70=325px -->
  <!-- Escala: 0.3 en D -> 325 px; escala = 325/0.3 = 1083 px/unidad D -->
  <!-- D=0: x=70, y=88 (H_b(0.3)=0.881) -->
  <!-- D=0.05: H_b(0.05)≈0.286, R=0.881-0.286=0.595, y=300-0.595*240=157, x=70+0.05*1083=124 -->
  <!-- D=0.1: H_b(0.1)≈0.469, R=0.881-0.469=0.412, y=300-0.412*240=201, x=70+0.1*1083=178 -->
  <!-- D=0.15: H_b(0.15)≈0.610, R=0.881-0.610=0.271, y=300-0.271*240=235, x=70+0.15*1083=232 -->
  <!-- D=0.2: H_b(0.2)≈0.722, R=0.881-0.722=0.159, y=300-0.159*240=262, x=70+0.2*1083=287 -->
  <!-- D=0.25: H_b(0.25)≈0.811, R=0.881-0.811=0.070, y=300-0.07*240=283, x=70+0.25*1083=341 -->
  <!-- D=0.3: R=0, y=300, x=395 -->
  <path d="M 70,88 C 95,120 124,157 178,201 232,235 287,262 341,283 395,300"
        fill="none" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Línea horizontal R=0 para D > 0.3 -->
  <line x1="395" y1="300" x2="430" y2="300" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Curva Gaussiana: R(D) = max(0, 1/2 log2(sigma^2/D)) con sigma^2 = 0.25 -->
  <!-- R(D) = 1/2 log2(0.25/D) para D ≤ 0.25, 0 para D > 0.25 -->
  <!-- D=0.01: R=1/2*log2(25)=2.32, pero lo cap a R_max≈1.5 en grafo -->
  <!-- Escala R: eje va de 0 a ~1.5, 240px total. 1.5 -> 240px, escala=160px/unidad -->
  <!-- Escala D: 0 a 0.25 = 325px, escala=1300px/unidad -->
  <!-- D=0.01: R=2.32 -> clip to 1.5, y=60, x=70+0.01*1300=83 -->
  <!-- D=0.02: R=1/2*log2(12.5)=1.82 -> clip 1.5, y=60, x=96 -->
  <!-- D=0.04: R=1/2*log2(6.25)=1.32, y=300-1.32*160=89, x=122 -->
  <!-- D=0.06: R=1/2*log2(4.17)=1.04, y=300-1.04*160=134, x=148 -->
  <!-- D=0.1: R=1/2*log2(2.5)=0.66, y=300-0.66*160=194, x=200 -->
  <!-- D=0.15: R=1/2*log2(1.67)=0.37, y=300-0.37*160=241, x=265 -->
  <!-- D=0.2: R=1/2*log2(1.25)=0.16, y=300-0.16*160=274, x=330 -->
  <!-- D=0.25: R=0, y=300, x=395 -->
  <path d="M 83,60 C 100,60 110,80 122,89 148,134 200,194 265,241 330,274 395,300"
        fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4"/>
  <line x1="395" y1="300" x2="430" y2="300" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- Punto D* vertical -->
  <line x1="395" y1="60" x2="395" y2="300" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Leyenda -->
  <rect x="110" y="55" width="175" height="55" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <line x1="120" y1="74" x2="150" y2="74" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="157" y="78" font-size="12" fill="#333">Bernoulli(p=0.3)</text>
  <text x="157" y="91" font-size="10" fill="#555">R(D)=H_b(p)−H_b(D)</text>
  <line x1="120" y1="100" x2="150" y2="100" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="157" y="104" font-size="12" fill="#333">Gaussiana (σ²=0.25)</text>

  <text x="240" y="345" text-anchor="middle" font-size="11" fill="#555">D* = distorsión máxima útil (umbral de cero-tasa)</text>
</svg>
