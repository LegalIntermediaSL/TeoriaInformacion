<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" width="580" height="400" font-family="serif" font-size="12">
  <text x="290" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Polarización de canales — Códigos polares (n=4)</text>
  <text x="290" y="40" text-anchor="middle" font-size="11" fill="#555">Combinando W consigo mismo se crean canales sintéticos más buenos o más malos que W</text>

  <!-- ===== ETAPA 0: 4 canales W originales ===== -->
  <text x="75" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Etapa 0</text>
  <text x="75" y="82" text-anchor="middle" font-size="11" fill="#6b7280">Canal W</text>
  <text x="75" y="95" text-anchor="middle" font-size="11" fill="#6b7280">I(W)=0.5</text>

  <rect x="42" y="105" width="66" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="75" y="123" text-anchor="middle" fill="#78350f">W (I=0.5)</text>

  <rect x="42" y="155" width="66" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="75" y="173" text-anchor="middle" fill="#78350f">W (I=0.5)</text>

  <rect x="42" y="225" width="66" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="75" y="243" text-anchor="middle" fill="#78350f">W (I=0.5)</text>

  <rect x="42" y="275" width="66" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="75" y="293" text-anchor="middle" fill="#78350f">W (I=0.5)</text>

  <!-- ===== ETAPA 1: 2 pares combinados → W⁻ y W⁺ ===== -->
  <!-- Flecha combinación primer par -->
  <line x1="108" y1="119" x2="155" y2="145" stroke="#475569" stroke-width="1.5"/>
  <line x1="108" y1="169" x2="155" y2="145" stroke="#475569" stroke-width="1.5"/>
  <!-- XOR box -->
  <circle cx="155" cy="145" r="10" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="155" y="150" text-anchor="middle" font-size="11" fill="#374151">⊕</text>

  <!-- Flecha combinación segundo par -->
  <line x1="108" y1="239" x2="155" y2="265" stroke="#475569" stroke-width="1.5"/>
  <line x1="108" y1="289" x2="155" y2="265" stroke="#475569" stroke-width="1.5"/>
  <circle cx="155" cy="265" r="10" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="155" y="270" text-anchor="middle" font-size="11" fill="#374151">⊕</text>

  <text x="215" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Etapa 1</text>

  <!-- Canal W⁻ (malo, par superior) -->
  <line x1="165" y1="145" x2="182" y2="145" stroke="#475569" stroke-width="1.5"/>
  <rect x="182" y="131" width="66" height="28" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="215" y="149" text-anchor="middle" fill="#7f1d1d" font-weight="bold">W⁻ (malo)</text>
  <text x="215" y="170" text-anchor="middle" font-size="10" fill="#dc2626">I≈0.17</text>

  <!-- Canal W⁺ (bueno, par superior) -->
  <line x1="108" y1="119" x2="182" y2="174" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="182" y="160" width="66" height="28" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="215" y="178" text-anchor="middle" fill="#14532d" font-weight="bold">W⁺ (bueno)</text>
  <text x="215" y="199" text-anchor="middle" font-size="10" fill="#16a34a">I≈0.83</text>

  <!-- Canal W⁻ (malo, par inferior) -->
  <line x1="165" y1="265" x2="182" y2="251" stroke="#475569" stroke-width="1.5"/>
  <rect x="182" y="237" width="66" height="28" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="215" y="255" text-anchor="middle" fill="#7f1d1d" font-weight="bold">W⁻ (malo)</text>
  <text x="215" y="276" text-anchor="middle" font-size="10" fill="#dc2626">I≈0.17</text>

  <!-- Canal W⁺ (bueno, par inferior) -->
  <line x1="108" y1="289" x2="182" y2="287" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="182" y="273" width="66" height="28" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="215" y="291" text-anchor="middle" fill="#14532d" font-weight="bold">W⁺ (bueno)</text>
  <text x="215" y="312" text-anchor="middle" font-size="10" fill="#16a34a">I≈0.83</text>

  <!-- ===== ETAPA 2: combinar W⁻ con W⁻ y W⁺ con W⁺ ===== -->
  <text x="360" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Etapa 2</text>

  <!-- XOR boxes etapa 2 -->
  <!-- W⁻⁻ y W⁻⁺ de los dos W⁻ -->
  <line x1="248" y1="145" x2="300" y2="165" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="251" x2="300" y2="165" stroke="#475569" stroke-width="1.5"/>
  <circle cx="300" cy="165" r="10" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="300" y="170" text-anchor="middle" font-size="11" fill="#374151">⊕</text>

  <!-- W⁺⁻ y W⁺⁺ de los dos W⁺ -->
  <line x1="248" y1="175" x2="300" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="289" x2="300" y2="230" stroke="#475569" stroke-width="1.5"/>
  <circle cx="300" cy="230" r="10" fill="white" stroke="#475569" stroke-width="1.5"/>
  <text x="300" y="235" text-anchor="middle" font-size="11" fill="#374151">⊕</text>

  <!-- 4 canales sintéticos finales -->
  <!-- W⁻⁻: muy malo -->
  <rect x="330" y="100" width="80" height="32" rx="5" fill="#fca5a5" stroke="#dc2626" stroke-width="2.5"/>
  <text x="370" y="118" text-anchor="middle" fill="#450a0a" font-weight="bold">W⁻⁻ (≈0)</text>
  <text x="370" y="133" text-anchor="middle" font-size="10" fill="#7f1d1d">I≈0.03  congelado</text>

  <!-- W⁻⁺: malo-bueno -->
  <rect x="330" y="155" width="80" height="32" rx="5" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="173" text-anchor="middle" fill="#451a03" font-weight="bold">W⁻⁺ (medio)</text>
  <text x="370" y="188" text-anchor="middle" font-size="10" fill="#92400e">I≈0.5</text>

  <!-- W⁺⁻: bueno-malo -->
  <rect x="330" y="210" width="80" height="32" rx="5" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="228" text-anchor="middle" fill="#451a03" font-weight="bold">W⁺⁻ (medio)</text>
  <text x="370" y="243" text-anchor="middle" font-size="10" fill="#92400e">I≈0.5</text>

  <!-- W⁺⁺: muy bueno -->
  <rect x="330" y="265" width="80" height="32" rx="5" fill="#86efac" stroke="#16a34a" stroke-width="2.5"/>
  <text x="370" y="283" text-anchor="middle" fill="#052e16" font-weight="bold">W⁺⁺ (≈1)</text>
  <text x="370" y="298" text-anchor="middle" font-size="10" fill="#14532d">I≈0.97  libre</text>

  <!-- Flechas etapa 2 → salida -->
  <line x1="310" y1="165" x2="330" y2="165" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="145" x2="330" y2="120" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="248" y1="175" x2="330" y2="171" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="310" y1="230" x2="330" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="251" x2="330" y2="280" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="248" y1="289" x2="330" y2="289" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Estrategia de codificación polar -->
  <rect x="435" y="95" width="130" height="215" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="500" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">Estrategia polar</text>
  <text x="500" y="130" text-anchor="middle" font-size="11" fill="#166534">Canales buenos (I≈1):</text>
  <text x="500" y="144" text-anchor="middle" font-size="11" fill="#166534">→ transmitir datos</text>
  <text x="500" y="165" text-anchor="middle" font-size="11" fill="#dc2626">Canales malos (I≈0):</text>
  <text x="500" y="179" text-anchor="middle" font-size="11" fill="#dc2626">→ bits congelados</text>
  <text x="500" y="193" text-anchor="middle" font-size="10" fill="#374151">(receptor los conoce)</text>
  <line x1="445" y1="205" x2="555" y2="205" stroke="#d1d5db" stroke-width="1"/>
  <text x="500" y="221" text-anchor="middle" font-size="11" fill="#374151">n→∞: fracción C(W)</text>
  <text x="500" y="235" text-anchor="middle" font-size="11" fill="#374151">de canales → I=1</text>
  <text x="500" y="249" text-anchor="middle" font-size="11" fill="#374151">Tasa → capacidad C</text>
  <text x="500" y="270" text-anchor="middle" font-size="10" fill="#6b7280">(Arıkan, 2009)</text>
  <text x="500" y="285" text-anchor="middle" font-size="10" fill="#6b7280">primer código que</text>
  <text x="500" y="298" text-anchor="middle" font-size="10" fill="#6b7280">alcanza C con O(n log n)</text>

  <!-- Nota conservación -->
  <text x="290" y="365" text-anchor="middle" font-size="11" fill="#475569">Conservación: media I(W^s) = I(W) para toda etapa s</text>
  <text x="290" y="380" text-anchor="middle" font-size="11" fill="#475569">La polarización separa canales → 0 ó → 1 sin cambiar la media</text>
</svg>
