<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" width="580" height="420" font-family="serif" font-size="12">
  <text x="290" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Árbol de búsqueda acotado — k-Vertex Cover (k=3)</text>
  <text x="290" y="40" text-anchor="middle" font-size="11" fill="#555">Cada arista (u,v) fuerza incluir u o v en la cobertura</text>

  <!-- NIVEL 0: Raíz -->
  <!-- Arista elegida: (u,v). Rama izquierda: incluir u. Rama derecha: incluir v -->
  <rect x="248" y="55" width="84" height="32" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="290" y="75" text-anchor="middle" fill="#0c4a6e" font-weight="bold">k=3, arista(u,v)</text>

  <!-- Aristas nivel 0 → nivel 1 -->
  <line x1="270" y1="87" x2="145" y2="130" stroke="#64748b" stroke-width="1.5"/>
  <line x1="310" y1="87" x2="435" y2="130" stroke="#64748b" stroke-width="1.5"/>
  <text x="185" y="113" font-size="11" fill="#059669" font-weight="bold">incluir u</text>
  <text x="370" y="113" font-size="11" fill="#dc2626" font-weight="bold">incluir v</text>

  <!-- NIVEL 1 izquierdo: incluimos u, k=2, nueva arista (a,b) -->
  <rect x="88" y="130" width="114" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="145" y="150" text-anchor="middle" fill="#14532d">u∈C, k=2, arista(a,b)</text>

  <!-- NIVEL 1 derecho: incluimos v, k=2, nueva arista (a,b) -->
  <rect x="378" y="130" width="114" height="32" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="435" y="150" text-anchor="middle" fill="#7f1d1d">v∈C, k=2, arista(a,b)</text>

  <!-- Aristas nivel 1 izq → nivel 2 -->
  <line x1="118" y1="162" x2="68" y2="205" stroke="#64748b" stroke-width="1.5"/>
  <line x1="172" y1="162" x2="222" y2="205" stroke="#64748b" stroke-width="1.5"/>
  <text x="60" y="190" font-size="10" fill="#059669">+a</text>
  <text x="205" y="190" font-size="10" fill="#dc2626">+b</text>

  <!-- Aristas nivel 1 der → nivel 2 -->
  <line x1="408" y1="162" x2="358" y2="205" stroke="#64748b" stroke-width="1.5"/>
  <line x1="462" y1="162" x2="512" y2="205" stroke="#64748b" stroke-width="1.5"/>
  <text x="350" y="190" font-size="10" fill="#059669">+a</text>
  <text x="495" y="190" font-size="10" fill="#dc2626">+b</text>

  <!-- NIVEL 2: 4 nodos, k=1 -->
  <rect x="30" y="205" width="76" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="68" y="223" text-anchor="middle" fill="#78350f">u,a∈C, k=1</text>

  <rect x="184" y="205" width="76" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="222" y="223" text-anchor="middle" fill="#78350f">u,b∈C, k=1</text>

  <rect x="320" y="205" width="76" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="358" y="223" text-anchor="middle" fill="#78350f">v,a∈C, k=1</text>

  <rect x="474" y="205" width="76" height="28" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="512" y="223" text-anchor="middle" fill="#78350f">v,b∈C, k=1</text>

  <!-- Aristas nivel 2 → nivel 3 (hojas) -->
  <!-- Nodo u,a: -->
  <line x1="50" y1="233" x2="32" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="86" y1="233" x2="104" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <!-- Nodo u,b: -->
  <line x1="204" y1="233" x2="186" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="240" y1="233" x2="258" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <!-- Nodo v,a: -->
  <line x1="340" y1="233" x2="322" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="376" y1="233" x2="394" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <!-- Nodo v,b: -->
  <line x1="494" y1="233" x2="476" y2="275" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="530" y1="233" x2="548" y2="275" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- NIVEL 3: 8 hojas -->
  <g fill="#f1f5f9" stroke="#475569" stroke-width="1.2">
    <rect x="10" y="275" width="44" height="26" rx="4"/><text x="32" y="292" text-anchor="middle" fill="#334155" font-size="11">+c</text>
    <rect x="82" y="275" width="44" height="26" rx="4"/><text x="104" y="292" text-anchor="middle" fill="#334155" font-size="11">+d</text>
    <rect x="164" y="275" width="44" height="26" rx="4"/><text x="186" y="292" text-anchor="middle" fill="#334155" font-size="11">+c</text>
    <rect x="236" y="275" width="44" height="26" rx="4"/><text x="258" y="292" text-anchor="middle" fill="#334155" font-size="11">+d</text>
    <rect x="300" y="275" width="44" height="26" rx="4"/><text x="322" y="292" text-anchor="middle" fill="#334155" font-size="11">+c</text>
    <rect x="372" y="275" width="44" height="26" rx="4"/><text x="394" y="292" text-anchor="middle" fill="#334155" font-size="11">+d</text>
    <rect x="454" y="275" width="44" height="26" rx="4"/><text x="476" y="292" text-anchor="middle" fill="#334155" font-size="11">+c</text>
    <rect x="526" y="275" width="44" height="26" rx="4"/><text x="548" y="292" text-anchor="middle" fill="#334155" font-size="11">+d</text>
  </g>

  <!-- Indicadores de solución en hojas -->
  <text x="32" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="104" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="186" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="258" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="322" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="394" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="476" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>
  <text x="548" y="316" text-anchor="middle" font-size="10" fill="#059669">✓?</text>

  <!-- Análisis de complejidad -->
  <rect x="100" y="340" width="380" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="290" y="358" text-anchor="middle" font-size="12" fill="#334155" font-weight="bold">Análisis de complejidad</text>
  <text x="290" y="374" text-anchor="middle" font-size="11" fill="#475569">Árbol binario de profundidad k = 3 → máximo 2³ = 8 hojas</text>
  <text x="290" y="390" text-anchor="middle" font-size="11" fill="#475569">Tiempo total: O(2^k · |G|) — fijo-parámetro tratable (FPT)</text>
</svg>
