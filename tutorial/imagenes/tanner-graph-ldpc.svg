<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320" font-family="serif" font-size="14">
  <!-- Título -->
  <text x="210" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Grafo de Tanner — Código LDPC (3,6)-regular</text>
  <text x="210" y="40" text-anchor="middle" font-size="12" fill="#555">n=6 nodos variable · m=3 nodos restricción · tasa R=1/2</text>

  <!-- Columna izquierda: nodos variable v1-v6 -->
  <!-- y: 70, 110, 150, 190, 230, 270 -->
  <g id="variable-nodes">
    <circle cx="90" cy="75" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="80" text-anchor="middle" fill="#1e40af" font-weight="bold">v₁</text>

    <circle cx="90" cy="125" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="130" text-anchor="middle" fill="#1e40af" font-weight="bold">v₂</text>

    <circle cx="90" cy="175" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="180" text-anchor="middle" fill="#1e40af" font-weight="bold">v₃</text>

    <circle cx="90" cy="225" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="230" text-anchor="middle" fill="#1e40af" font-weight="bold">v₄</text>

    <circle cx="90" cy="275" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="280" text-anchor="middle" fill="#1e40af" font-weight="bold">v₅</text>

    <circle cx="90" cy="305" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="310" text-anchor="middle" fill="#1e40af" font-weight="bold">v₆</text>
  </g>

  <!-- Columna derecha: nodos restricción c1-c3 -->
  <!-- y: 125, 200, 275 -->
  <g id="check-nodes">
    <rect x="302" y="100" width="36" height="36" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="320" y="122" text-anchor="middle" fill="#9d174d" font-weight="bold">c₁</text>

    <rect x="302" y="175" width="36" height="36" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="320" y="197" text-anchor="middle" fill="#9d174d" font-weight="bold">c₂</text>

    <rect x="302" y="250" width="36" height="36" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="320" y="272" text-anchor="middle" fill="#9d174d" font-weight="bold">c₃</text>
  </g>

  <!-- Aristas: H = [[1,1,0,1,0,0],[0,1,1,0,1,0],[1,0,0,0,1,1]] -->
  <!-- c1: v1, v2, v4 -->
  <line x1="108" y1="75" x2="302" y2="118" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="108" y1="125" x2="302" y2="118" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="108" y1="225" x2="302" y2="118" stroke="#6b7280" stroke-width="1.5"/>

  <!-- c2: v2, v3, v5 -->
  <line x1="108" y1="125" x2="302" y2="193" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="108" y1="175" x2="302" y2="193" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="108" y1="275" x2="302" y2="193" stroke="#6b7280" stroke-width="1.5"/>

  <!-- c3: v1, v5, v6 -->
  <line x1="108" y1="75" x2="302" y2="268" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="108" y1="275" x2="302" y2="268" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="108" y1="305" x2="302" y2="268" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Etiquetas de columna -->
  <text x="90" y="58" text-anchor="middle" font-size="12" fill="#1e40af">Nodos variable</text>
  <text x="320" y="90" text-anchor="middle" font-size="12" fill="#9d174d">Nodos restricción</text>

  <!-- Nota: matriz de paridad H -->
  <text x="210" y="340" text-anchor="middle" font-size="11" fill="#444">Cada nodo variable tiene grado 2 · Cada nodo restricción tiene grado 3</text>
</svg>
