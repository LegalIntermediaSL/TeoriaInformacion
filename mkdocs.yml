site_name: Tutorial de Teoría de la Información
site_description: Tutorial completo de Teoría de la Información, Computabilidad y Complejidad Computacional
site_author: LegalIntermediaSL
site_url: https://legalintermediasl.github.io/TeoriaInformacion/
repo_url: https://github.com/LegalIntermediaSL/TeoriaInformacion
repo_name: TeoriaInformacion
edit_uri: edit/main/

docs_dir: tutorial
theme:
  name: material
  language: es
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate

plugins:
  - search:
      lang: es

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
